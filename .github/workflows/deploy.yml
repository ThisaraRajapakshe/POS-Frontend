name: Deploy Frontend to Lightsail

on:
  push:
    branches: [ master ]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .  # Root of frontend repo
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/pos-frontend:latest
          build-args: |
            BUILD_CONFIGURATION=production

      - name: Restart Frontend on Lightsail
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            # Pull the latest frontend image
            docker-compose -f docker-compose.prod.yml pull frontend
            # Restart ONLY the frontend container (backend keeps running)
            docker-compose -f docker-compose.prod.yml up -d --no-deps frontend
            docker system prune -f